<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>M3DIIR · Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2F3EE; --surface:#FFFFFF; --surface-2:#EAEBE3; --surface-3:#DFE1D6;
  --border:#D6D8CB; --border-soft:#E7E8DF;
  --text:#1E2320; --text-dim:#72786C; --text-faint:#A7AC9C;
  --blue:#2C5F76; --blue-dim:#E1EBEE;
  --danger:#BC4438; --danger-dim:#F6E3DF;
  --good:#3E7C50; --good-dim:#E5F0E7;
  --warn:#A47728; --warn-dim:#F3ECD9;
  --copper:#AD5A2C; --copper-dim:#F3E3D6;
  --purple:#5C5A9C; --purple-dim:#E9E8F3;
  --grad:linear-gradient(135deg,#2C5F76 0%,#5C6E63 45%,#AD5A2C 100%);
  --radius:10px; --radius-sm:7px;
  --font:'Inter',sans-serif; --font-display:'Space Grotesk','Inter',sans-serif; --font-mono:'JetBrains Mono',monospace;
  --shadow-sm:0 1px 2px rgba(30,35,32,.05), 0 1px 0 rgba(30,35,32,.03);
  --shadow-md:0 4px 14px rgba(30,35,32,.07), 0 1px 2px rgba(30,35,32,.04);
}
body[data-theme="dark"]{
  --bg:#14171A; --surface:#1B1F22; --surface-2:#212629; --surface-3:#282E31;
  --border:#333A3E; --border-soft:#262C2F;
  --text:#EBEDE7; --text-dim:#9BA29A; --text-faint:#5C6360;
  --blue:#5B9BB5; --blue-dim:#1B2E36;
  --danger:#DC7466; --danger-dim:#332120;
  --good:#6FB584; --good-dim:#182A1F;
  --warn:#D2A75B; --warn-dim:#332A18;
  --copper:#D3895A; --copper-dim:#332419;
  --purple:#9B98D6; --purple-dim:#232churn1e2e;
  --grad:linear-gradient(135deg,#5B9BB5 0%,#7A8C7E 45%,#D3895A 100%);
  --shadow-sm:0 1px 2px rgba(0,0,0,.25), 0 1px 0 rgba(0,0,0,.15);
  --shadow-md:0 4px 16px rgba(0,0,0,.35), 0 1px 2px rgba(0,0,0,.2);
}
body{transition:background .15s;}
*{box-sizing:border-box;}
body{
  margin:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;-webkit-font-smoothing:antialiased;
  background-image:
    linear-gradient(var(--border-soft) 1px, transparent 1px),
    linear-gradient(90deg, var(--border-soft) 1px, transparent 1px);
  background-size:34px 34px;
  background-attachment:fixed;
}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:14px;}
a{color:var(--blue);}
::selection{background:var(--copper-dim);}
:focus-visible{outline:2px solid var(--blue);outline-offset:2px;}
h1,h2,h3{font-family:var(--font-display);}

.app{display:flex;min-height:100vh;}

/* ---------- SIDEBAR ---------- */
.sidebar{width:230px;flex:0 0 230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:22px 14px;}
.brand{padding:0 8px 18px 8px;}
.brand-mark{display:flex;align-items:center;gap:10px;}
.ring{width:42px;height:42px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;flex:none;padding:2.5px;}
.ring-inner{width:100%;height:100%;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;}
.ring-inner svg{width:18px;height:18px;color:var(--text);}
.brand-name{font-weight:800;font-size:16.5px;letter-spacing:-.01em;}
.brand-sub{font-size:11px;color:var(--text-dim);margin-top:1px;}
.quicklinks{display:flex;gap:7px;margin-top:14px;}
.qlink{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border-radius:var(--radius-sm);background:var(--surface-2);text-decoration:none;color:var(--text-dim);font-size:9.5px;font-weight:600;transition:background .12s;}
.qlink:hover{background:var(--surface-3);}
.qlink svg{width:16px;height:16px;}
.qlink.ig svg{color:#C13584;}
.qlink.fb svg{color:#0866FF;}
.qlink.mk svg{color:#0866FF;}

.nav{display:flex;flex-direction:column;gap:1px;margin-top:16px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);background:none;border:none;color:var(--text-dim);text-align:left;font-size:13.5px;font-weight:600;transition:background .12s,color .12s;}
.nav-item svg{width:17px;height:17px;flex:none;}
.nav-item:hover{background:var(--surface-2);color:var(--text);}
.nav-item.active{background:var(--surface-2);color:var(--text);}
.nav-item.active svg{color:var(--blue);}
.nav-badge{margin-left:auto;font-family:var(--font-mono);font-size:10px;font-weight:700;background:var(--danger);color:#fff;padding:1px 6px;border-radius:20px;min-width:18px;text-align:center;}
.nav-spacer{flex:1;}
.nav-foot{padding:12px 8px 0;border-top:1px solid var(--border-soft);margin-top:10px;font-size:10.5px;color:var(--text-faint);line-height:1.6;}

/* ---------- MAIN ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:5;}
.topbar h1{font-size:19px;margin:0;font-weight:800;letter-spacing:-.01em;}
.topbar .sub{color:var(--text-dim);font-size:12.5px;margin-top:3px;}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.content{padding:22px 28px 60px;flex:1;}

.banner{display:flex;align-items:center;gap:10px;background:var(--danger-dim);color:#C0202E;border:1px solid #F6C6CB;border-radius:var(--radius);padding:12px 16px;margin-bottom:18px;font-size:13px;font-weight:600;}
.banner svg{width:16px;height:16px;flex:none;}
.banner a{color:#C0202E;text-decoration:underline;font-weight:700;}
.banner.warnb{background:var(--warn-dim);color:#8a5a0f;border-color:#F5DFAE;}
.banner.warnb a{color:#8a5a0f;}

.btn{border:1px solid var(--border);background:var(--surface);color:var(--text);padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:6px;transition:border-color .12s,background .12s;}
.btn:hover{background:var(--surface-2);}
.btn svg{width:14px;height:14px;}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-primary:hover{background:#1AA1FF;}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text-dim);}
.btn-ghost:hover{color:var(--text);background:var(--surface-2);}
.btn-sm{padding:5px 9px;font-size:12px;}
.btn-danger-text{color:var(--danger);}
.btn-wa{background:#25D366;color:#fff;border-color:#25D366;}
.btn-wa:hover{background:#22c35e;}

/* ---------- DASHBOARD ---------- */
.grid-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
.stat-card .label{font-size:11.5px;color:var(--text-dim);font-weight:600;}
.stat-card .value{font-family:var(--font-mono);font-size:25px;font-weight:700;margin-top:8px;}
.stat-card .value.grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.stat-card .value.danger{color:var(--danger);}
.stat-card .value.warn{color:var(--warn);}
.stat-card .foot{font-size:11px;color:var(--text-faint);margin-top:4px;}

.dash-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:16px;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
.panel h3{font-size:14.5px;margin:0 0 14px;font-weight:800;display:flex;align-items:center;justify-content:space-between;}
.panel h3 a{font-size:11.5px;color:var(--blue);text-decoration:none;font-weight:700;cursor:pointer;}

.mini-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border-soft);font-size:13px;gap:10px;}
.mini-row:last-child{border-bottom:none;}
.mini-row .t{color:var(--text);font-weight:600;}
.mini-row .s{color:var(--text-faint);font-size:11.5px;font-weight:400;margin-top:1px;}

.empty{color:var(--text-faint);font-size:13px;text-align:center;padding:28px 10px;}
.empty b{display:block;color:var(--text-dim);margin-bottom:4px;font-size:13.5px;font-weight:700;}

.chart-wrap{display:flex;align-items:flex-end;gap:14px;height:140px;margin-top:6px;}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;}
.chart-bars{display:flex;gap:3px;align-items:flex-end;height:110px;}
.chart-bar{width:11px;border-radius:3px 3px 0 0;}
.chart-bar.in{background:var(--blue);}
.chart-bar.out{background:var(--text-faint);}
.chart-label{font-size:10px;color:var(--text-faint);font-weight:600;text-transform:uppercase;}
.chart-legend{display:flex;gap:14px;font-size:11.5px;color:var(--text-dim);margin-top:10px;}
.chart-legend span{display:inline-flex;align-items:center;gap:5px;}
.dot{width:8px;height:8px;border-radius:2px;display:inline-block;}

/* ---------- TABLE / CARDS ---------- */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.toolbar select, .toolbar input[type=text]{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:var(--radius-sm);font-size:13px;}
.toolbar .grow{flex:1;}
.search{min-width:200px;}

.cards{display:flex;flex-direction:column;gap:10px;}
.card-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:grid;grid-template-columns:1.5fr .8fr 1fr .9fr 1fr auto;gap:14px;align-items:center;}
.card-row .main-cell .name{font-weight:700;font-size:14px;}
.card-row .main-cell .sub{color:var(--text-faint);font-size:11.5px;margin-top:3px;}
.cell-label{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:3px;font-weight:600;}
.cell-val{font-size:13px;font-family:var(--font-mono);}
.row-actions{display:flex;gap:4px;justify-self:end;}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;}
.b-pendiente{background:var(--warn-dim);color:var(--warn);}.b-pendiente::before{background:var(--warn);}
.b-imprimiendo{background:var(--blue-dim);color:#0077B6;}.b-imprimiendo::before{background:#0077B6;}
.b-listo{background:var(--good-dim);color:var(--good);}.b-listo::before{background:var(--good);}
.b-enviado{background:var(--purple-dim);color:#5851DB;}.b-enviado::before{background:#5851DB;}
.b-entregado{background:var(--good-dim);color:var(--good);}.b-entregado::before{background:var(--good);}
.b-cancelado{background:var(--danger-dim);color:var(--danger);}.b-cancelado::before{background:var(--danger);}
.b-nuevo{background:var(--warn-dim);color:var(--warn);}.b-nuevo::before{background:var(--warn);}
.b-conversando{background:var(--blue-dim);color:#0077B6;}.b-conversando::before{background:#0077B6;}
.b-convertido{background:var(--good-dim);color:var(--good);}.b-convertido::before{background:var(--good);}
.b-descartado{background:var(--surface-3);color:var(--text-dim);}.b-descartado::before{background:var(--text-faint);}
.b-atrasado{background:var(--danger);color:#fff;}.b-atrasado::before{display:none;}
.pay-sinseña{color:var(--text-faint);}
.pay-seña{color:var(--warn);}
.pay-completo{color:var(--good);}

/* ---------- FILAMENTO ---------- */
.fila-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.fila-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;gap:14px;align-items:center;}
.spool{width:54px;height:54px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;position:relative;}
.spool::after{content:'';width:58%;height:58%;border-radius:50%;background:var(--surface);position:absolute;}
.spool .pct{position:relative;z-index:1;font-family:var(--font-mono);font-size:10.5px;font-weight:700;}
.fila-info{flex:1;min-width:0;}
.fila-info .name{font-weight:700;font-size:13.5px;}
.fila-info .meta{color:var(--text-faint);font-size:11.5px;margin-top:2px;}
.fila-info .grams{font-family:var(--font-mono);font-size:12px;color:var(--text-dim);margin-top:6px;}
.fila-low{border-color:var(--danger);}
.fila-humid{border-color:var(--warn);}
.fila-actions{display:flex;flex-direction:column;gap:5px;}
.fila-flags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
.flag{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em;}
.flag-low{background:var(--danger-dim);color:var(--danger);}
.flag-humid{background:var(--warn-dim);color:var(--warn);}

/* ---------- MODELOS ---------- */
.modelo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.modelo-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;}
.modelo-photo{width:100%;height:120px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-faint);}
.modelo-photo img{width:100%;height:100%;object-fit:cover;}
.modelo-body{padding:14px 16px;display:flex;flex-direction:column;gap:7px;}
.modelo-card .name{font-weight:700;font-size:14.5px;}
.modelo-card .cat{font-size:11px;color:var(--blue);text-transform:uppercase;letter-spacing:.04em;font-weight:700;}
.modelo-meta{display:flex;gap:14px;font-family:var(--font-mono);font-size:12px;color:var(--text-dim);margin-top:2px;}
.modelo-meta div span{display:block;font-size:9.5px;color:var(--text-faint);text-transform:uppercase;font-family:var(--font);font-weight:600;}
.modelo-card .file{font-size:11.5px;color:var(--text-faint);border-top:1px dashed var(--border);padding-top:8px;margin-top:2px;word-break:break-all;}

/* ---------- CLIENTES ---------- */
.cliente-grid{display:flex;flex-direction:column;gap:10px;}
.cliente-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:14px;}
.cliente-avatar{width:38px;height:38px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;flex:none;font-weight:800;color:#fff;font-size:14px;}
.cliente-row .name{font-weight:700;font-size:13.5px;}
.cliente-row .sub{color:var(--text-faint);font-size:11.5px;}
.cliente-stats{display:flex;gap:18px;margin-left:auto;text-align:right;}
.cliente-stats div span{display:block;font-size:9.5px;color:var(--text-faint);text-transform:uppercase;font-weight:600;}
.cliente-stats div b{font-family:var(--font-mono);font-size:13px;font-weight:700;}

/* ---------- PRESUPUESTOS ---------- */
.calc-wrap{display:grid;grid-template-columns:1fr 340px;gap:18px;}
.calc-field{margin-bottom:14px;}
.calc-field label{display:block;font-size:11.5px;color:var(--text-dim);margin-bottom:5px;font-weight:600;}
.calc-field input,.calc-field select{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 10px;border-radius:var(--radius-sm);}
.calc-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.calc-result{position:sticky;top:90px;align-self:start;}
.result-line{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-soft);font-size:13px;}
.result-line .v{font-family:var(--font-mono);}
.result-total{display:flex;justify-content:space-between;align-items:baseline;padding-top:14px;margin-top:6px;border-top:1px solid var(--border);}
.result-total .v{font-family:var(--font-mono);font-size:25px;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.result-total .l{font-size:13px;font-weight:700;}

/* ---------- LEADS ---------- */
.lead-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;gap:14px;align-items:flex-start;}
.lead-platform{flex:none;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;}
.lead-platform.ig{background:var(--grad);color:#fff;}
.lead-platform.fb{background:#0866FF;color:#fff;}
.lead-platform.otro{background:var(--surface-3);color:var(--text-dim);}
.lead-body{flex:1;min-width:0;}
.lead-top{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.lead-top .user{font-weight:700;font-size:13.5px;}
.lead-msg{color:var(--text-dim);font-size:12.5px;margin-top:5px;line-height:1.5;}
.lead-meta{display:flex;gap:10px;margin-top:8px;align-items:center;}
.lead-link{font-size:11.5px;font-weight:700;text-decoration:none;}
.lead-date{font-size:11px;color:var(--text-faint);font-family:var(--font-mono);}

/* ---------- GASTOS ---------- */
.gasto-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;display:flex;align-items:center;gap:14px;}
.gasto-cat{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--surface-3);color:var(--text-dim);flex:none;}
.gasto-row .nota{flex:1;font-size:13px;color:var(--text-dim);}
.gasto-row .monto{font-family:var(--font-mono);font-weight:700;font-size:13.5px;}

/* ---------- CONFIG ---------- */
.config-form{max-width:480px;display:flex;flex-direction:column;gap:14px;}
.backup-actions{display:flex;gap:10px;margin-top:6px;}
.info-box{background:var(--blue-dim);border:1px solid #BEE3F8;border-radius:var(--radius-sm);padding:12px 14px;font-size:12.5px;color:#055a8c;line-height:1.55;}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius);width:100%;max-width:480px;max-height:88vh;overflow-y:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--border);}
.modal-head h3{font-size:15px;margin:0;font-weight:800;}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:13px;}
.field label{display:block;font-size:11.5px;color:var(--text-dim);margin-bottom:5px;font-weight:600;}
.field input,.field select,.field textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 10px;border-radius:var(--radius-sm);}
.field textarea{resize:vertical;min-height:60px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:16px 20px;border-top:1px solid var(--border);}
.field-check{display:flex;align-items:center;gap:8px;}
.field-check input{width:auto;}

.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:var(--bg);padding:11px 14px;border-radius:var(--radius-sm);font-size:13px;z-index:60;opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;font-weight:600;display:flex;align-items:center;gap:12px;}
.toast.show{opacity:1;transform:translateY(0);}
.toast .undo-btn{background:none;border:none;color:var(--blue);font-weight:700;font-size:13px;padding:0;}

.theme-toggle{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 10px;border-radius:var(--radius-sm);background:var(--surface-2);margin-top:10px;font-size:12.5px;font-weight:600;color:var(--text-dim);}
.switch{width:34px;height:19px;border-radius:20px;background:var(--surface-3);border:1px solid var(--border);position:relative;flex:none;}
.switch::after{content:'';width:13px;height:13px;border-radius:50%;background:var(--text-dim);position:absolute;top:2px;left:2px;transition:left .15s,background .15s;}
body[data-theme="dark"] .switch{background:var(--blue);}
body[data-theme="dark"] .switch::after{left:17px;background:#fff;}

.app-loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;}
.app-loading .ring{width:48px;height:48px;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.bottom-nav{display:none;}
.hidden{display:none !important;}

/* ---------- MODULO 1: FINANZAS/METAS/AMORTIZACION ---------- */
.goal-wrap{display:flex;flex-direction:column;gap:8px;}
.goal-top{display:flex;justify-content:space-between;align-items:baseline;}
.goal-top .amt{font-family:var(--font-mono);font-weight:800;font-size:19px;}
.goal-top .amt small{font-size:11.5px;color:var(--text-faint);font-weight:600;}

/* ============ STORAGE ============ */
const KEYS = {pedidos:'pedidos:list', filamentos:'filamentos:list', modelos:'modelos:list', leads:'leads:list', presupuestos:'presupuestos:list', gastos:'gastos:list', maquinas:'maquinas:list', finanzas:'finanzas:data', config:'config:data'};
let DB = { pedidos:[], filamentos:[], modelos:[], leads:[], presupuestos:[], gastos:[], maquinas:[], finanzas:{ retirosFondo:[], dolar:null },
  config:{nombreNegocio:'M3diir', instagram:'@m3diir', whatsapp:'', moneda:'$',
  precioKwh:140, consumoW:120, vidaUtilHoras:4320, costoRepuestos:150000, margenErrorPct:5, margenGanancia:4, markupInsumosPct:30, markupMLPct:20,
  metaObjetivo:1300000, metaNombre:'Bambu Lab A1 Combo', mermaPct:8, alertaGramos:150, alertaHumedadDias:90} };

const MAQUINAS_DEFAULT = [
  {id:'ender3v3', nombre:'Ender 3 V3 Plus', horasUso:0, alertaCada:100, ultimaAlertaHoras:0},
  {id:'bambua1', nombre:'Bambu Lab A1', horasUso:0, alertaCada:300, ultimaAlertaHoras:0}
];

let storageOk = true;
try { localStorage.getItem('test'); } catch(e) { storageOk = false; }

window.storage = {
  async get(k){ if(!storageOk) return null; const v = localStorage.getItem(k); return v ? {key:k, value:v} : null; },
  async set(k,v){ if(storageOk) localStorage.setItem(k, v); return {key:k,value:v}; },
  async delete(k){ if(storageOk) localStorage.removeItem(k); return {key:k,deleted:true}; },
  async list(){ return {keys: storageOk ? Object.keys(localStorage) : []}; }
};

async function loadAll(){
  for(const k of ['pedidos','filamentos','modelos','leads','presupuestos','gastos','maquinas']){
    try{ const r = await window.storage.get(KEYS[k]); DB[k] = r ? JSON.parse(r.value) : []; }catch(e){ DB[k] = []; }
  }
  if(!DB.maquinas || !DB.maquinas.length) DB.maquinas = MAQUINAS_DEFAULT.map(m=>({...m}));
  try{ const r = await window.storage.get(KEYS.config); if(r) DB.config = {...DB.config, ...JSON.parse(r.value)}; }catch(e){}
  try{ const r = await window.storage.get(KEYS.finanzas); if(r) DB.finanzas = {...DB.finanzas, ...JSON.parse(r.value)}; }catch(e){}
}
async function save(key){
  try{ const ok = await window.storage.set(KEYS[key], JSON.stringify(DB[key])); if(!ok && storageOk===false) toast('No se pudo guardar. Modo local.'); }catch(e){ toast('No se pudo guardar. Reintentá.'); }
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function toast(msg, actionLabel, actionFn){
  const t = document.getElementById('toast');
  t.innerHTML = `<span>${msg}</span>` + (actionLabel? `<button class="undo-btn" id="toastAction">${actionLabel}</button>` : '');
  if(actionLabel){ document.getElementById('toastAction').onclick = ()=>{ actionFn(); t.classList.remove('show'); clearTimeout(window._toastTimer); }; }
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), actionLabel? 4500 : 2200);
}
function money(n){ const c = DB.config.moneda || '$'; return c + (Number(n||0)).toLocaleString('es-AR',{maximumFractionDigits:0}); }
function fmtDate(d){ if(!d) return '—'; const dt = new Date(d+'T00:00:00'); return dt.toLocaleDateString('es-AR',{day:'2-digit',month:'short'}); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function daysSince(d){ if(!d) return null; const then = new Date(d+'T00:00:00'); const now = new Date(todayStr()+'T00:00:00'); return Math.round((now-then)/86400000); }
function esc(s){ return (s===undefined||s===null) ? '' : String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function waDigits(s){ if(!s) return ''; const d = String(s).replace(/[^0-9]/g,''); return d.length>=8 ? d : ''; }

/* ============ MODULO 1: FONDO DE AHORRO (BAMBU-OMETRO) ============ */
// El fondo se calcula como: total efectivamente cobrado en pedidos (anticipos + pagos completos)
// menos gastos del taller, menos retiros manuales del fondo. Así el Bambu-Ómetro refleja ahorro neto real.
function cobradoPedido(p){
  if(p.estado==='Cancelado') return 0;
  const total = Number(p.precio||0)+Number(p.costoEnvio||0)+Number(p.costoEmbalaje||0);
  if(p.estadoPago==='Pagado completo') return total;
  if(p.estadoPago==='Seña pagada') return Number(p.anticipo||0);
  return 0;
}
function totalCobrado(){ return DB.pedidos.reduce((s,p)=>s+cobradoPedido(p),0); }
function totalGastos(){ return DB.gastos.reduce((s,g)=>s+Number(g.monto||0),0); }
function totalRetiros(){ return (DB.finanzas.retirosFondo||[]).reduce((s,r)=>s+Number(r.monto||0),0); }
function fondoAhorro(){ return Math.max(0, totalCobrado() - totalGastos() - totalRetiros()); }
let _lastFondoPct = null;
async function registrarCobro(pedidoId, montoAnterior){
  // Se llama al guardar un pedido; si el cobro subió, dispara animación en el dashboard.
}

/* ============ MODULO 1: COTIZACION DOLAR ============ */
async function actualizarDolar(){
  const el = document.getElementById('fxPill');
  if(el) el.textContent = 'Consultando...';
  try{
    const resp = await fetch('https://dolarapi.com/v1/dolares/blue');
    const data = await resp.json();
    DB.finanzas.dolar = {compra:data.compra, venta:data.venta, fecha: new Date().toISOString()};
    await save('finanzas');
    renderPage();
    toast('Cotización del dólar actualizada');
  }catch(e){
    toast('No se pudo consultar el dólar (revisá tu conexión)');
    if(el) el.textContent = DB.finanzas.dolar ? money(DB.finanzas.dolar.venta)+' (ant.)' : 'Sin datos';
  }
}

/* ============ MODULO 1: MAQUINAS / AMORTIZACION ============ */
function estadoMantenimiento(m){
  const desdeUltimo = m.horasUso - (m.ultimaAlertaHoras||0);
  if(desdeUltimo >= m.alertaCada) return 'danger';
  if(desdeUltimo >= m.alertaCada*0.8) return 'warn';
  return 'ok';
}
async function sumarHorasMaquina(id, horas){
  const m = DB.maquinas.find(x=>x.id===id); if(!m) return;
  m.horasUso = Math.round((Number(m.horasUso||0) + Number(horas||0))*100)/100;
  await save('maquinas'); renderPage();
}
async function marcarMantenimiento(id){
  const m = DB.maquinas.find(x=>x.id===id); if(!m) return;
  m.ultimaAlertaHoras = m.horasUso;
  await save('maquinas'); renderPage();
  toast('Mantenimiento registrado, contador reiniciado');
}

/* ============ NAV ============ */
const SECTIONS = [
  {id:'dashboard', label:'Resumen', icon:'dashboard'},
  {id:'pedidos', label:'Pedidos', icon:'pedidos'},
  {id:'clientes', label:'Clientes', icon:'clientes'},
  {id:'filamentos', label:'Filamento', icon:'filamento'},
  {id:'presupuestos', label:'Presupuestos', icon:'presupuestos'},
  {id:'modelos', label:'Modelos', icon:'modelos'},
  {id:'leads', label:'Redes (IG/FB)', icon:'leads'},
  {id:'gastos', label:'Gastos', icon:'gastos'},
  {id:'finanzas', label:'Finanzas y Metas', icon:'finanzas'},
  {id:'config', label:'Configuración', icon:'config'},
];
let current = 'dashboard';
function renderNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = SECTIONS.map(s=>{
    let badge='';
    if(s.id==='pedidos'){ const n=DB.pedidos.filter(p=>!['Entregado','Cancelado'].includes(p.estado)).length; if(n) badge=`<span class="nav-badge">${n}</span>`; }
    if(s.id==='filamentos'){ const n=DB.filamentos.filter(f=>lowStock(f)||humedadRiesgo(f)).length; if(n) badge=`<span class="nav-badge">${n}</span>`; }
    if(s.id==='leads'){ const n=DB.leads.filter(l=>!l.respondido).length; if(n) badge=`<span class="nav-badge">${n}</span>`; }
    if(s.id==='finanzas'){ const n=DB.maquinas.filter(m=>estadoMantenimiento(m)==='danger').length; if(n) badge=`<span class="nav-badge">${n}</span>`; }
    return `<button class="nav-item ${s.id===current?'active':''}" onclick="goTo('${s.id}')">${ICONS[s.icon]}<span>${s.label}</span>${badge}</button>`;
  }).join('');
  const bnSections = ['dashboard','pedidos','clientes','leads','config'];
  const bn = document.getElementById('bottomNav');
  if(bn){
    bn.innerHTML = bnSections.map(id=>{
      const s = SECTIONS.find(x=>x.id===id);
      let dot='';
      if(id==='pedidos' && DB.pedidos.some(p=>!['Entregado','Cancelado'].includes(p.estado))) dot='<span class="bn-badge"></span>';
      if(id==='leads' && DB.leads.some(l=>!l.respondido)) dot='<span class="bn-badge"></span>';
      return `<button class="${id===current?'active':''}" onclick="goTo('${id}')">${ICONS[s.icon]}${dot}<span>${s.label.split(' ')[0]}</span></button>`;
    }).join('');
  }
}
function lowStock(f){ if(!f.pesoTotal) return false; const pctBajo = (f.pesoRestante/f.pesoTotal) <= 0.15; const gramosBajo = f.pesoRestante <= (DB.config.alertaGramos||150); return pctBajo || gramosBajo; }
function humedadRiesgo(f){ const d = daysSince(f.fechaApertura); return d!==null && d >= (DB.config.alertaHumedadDias||90); }
function isAtrasado(p){ return p.fechaEntrega && p.fechaEntrega < todayStr() && !['Entregado','Cancelado'].includes(p.estado); }
function goTo(id, opts){ current = id; renderNav(); renderPage(opts); }

function openForm(type, item){
  const schema = SCHEMAS[type];
  document.getElementById('modalTitle').textContent = schema.title(item);
  const body = document.getElementById('modalBody');
  const rows = {}; const order = [];
  schema.fields.forEach(f=>{ const r=f.row||f.key; if(!rows[r]){rows[r]=[];order.push(r);} rows[r].push(f); });
  body.innerHTML = order.map(r=>{ const fs=rows[r]; const inner=fs.map(f=>renderField(f,item,type)).join(''); return fs.length>1?`<div class="field-row">${inner}</div>`:inner; }).join('');
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modalSaveBtn').onclick = ()=>saveForm(type, item);
}
function renderField(f, item, type){
  const val = item ? item[f.key] : (typeof f.default==='function' ? f.default() : f.default);
  const id = 'fld_'+f.key;
  if(type==='pedido' && f.key==='filamentoId'){
    const opts = ['<option value="">— ninguno (no descontar stock) —</option>'].concat(DB.filamentos.map(fl=>`<option value="${fl.id}" ${fl.id===val?'selected':''}>${esc(fl.marca||'')} ${esc(fl.tipo)} ${esc(fl.color||'')} (${fl.pesoRestante}g)</option>`));
    return `<div class="field"><label>${f.label}</label><select id="${id}">${opts.join('')}</select></div>`;
  }
  if(f.type==='select') return `<div class="field"><label>${f.label}</label><select id="${id}">${f.options.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select></div>`;
  if(f.type==='textarea') return `<div class="field"><label>${f.label}</label><textarea id="${id}">${val||''}</textarea></div>`;
  if(f.type==='checkbox') return `<div class="field field-check"><input type="checkbox" id="${id}" ${val?'checked':''}><label style="margin:0">${f.label}</label></div>`;
  if(f.type==='color') return `<div class="field"><label>${f.label}</label><input type="color" id="${id}" value="${val||'#0095F6'}" style="height:38px;padding:4px;"></div>`;
  return `<div class="field"><label>${f.label}</label><input type="${f.type}" id="${id}" value="${val!==undefined&&val!==null?val:''}" placeholder="${f.placeholder||''}"></div>`;
}
async function saveForm(type, item){
  const schema = SCHEMAS[type];
  const data = item ? {...item} : {id:uid()};
  let valid = true;
  schema.fields.forEach(f=>{
    const el = document.getElementById('fld_'+f.key);
    let v;
    if(f.type==='checkbox') v = el.checked;
    else if(f.type==='number') v = el.value===''? 0 : Number(el.value);
    else v = el.value;
    if(f.required && !v){ valid=false; el.style.borderColor='var(--danger)'; }
    data[f.key] = v;
  });
  if(!valid){ toast('Completá los campos obligatorios'); return; }

  if(type==='retiro'){
    DB.finanzas.retirosFondo = DB.finanzas.retirosFondo || [];
    DB.finanzas.retirosFondo.unshift(data);
    await save('finanzas');
    closeModal(); renderPage();
    toast('Retiro registrado');
    return;
  }

  const map = {pedido:'pedidos', filamento:'filamentos', modelo:'modelos', lead:'leads', gasto:'gastos'};
  const key = map[type];
  const idx = DB[key].findIndex(x=>x.id===data.id);
  const prevFondoPct = metaPct();
  const esNuevo = idx===-1;
  const estadoAnterior = !esNuevo ? DB[key][idx].estado : null;
  const yaDescontado = !esNuevo ? DB[key][idx].stockDescontado : false;

  if(idx>-1) DB[key][idx]=data; else DB[key].unshift(data);

  // Módulo 2: descuento automático de stock al pasar a Listo/Enviado/Entregado por primera vez
  if(type==='pedido' && data.filamentoId && data.gramosUsados>0 && !data.stockDescontado){
    const disparaDescuento = ['Listo','Enviado','Entregado'].includes(data.estado);
    if(disparaDescuento){
      const f = DB.filamentos.find(x=>x.id===data.filamentoId);
      if(f){
        const merma = Number(DB.config.mermaPct||0);
        const totalUsar = Number(data.gramosUsados) * (1+merma/100);
        f.pesoRestante = Math.max(0, Number(f.pesoRestante||0) - totalUsar);
        await save('filamentos');
        data.stockDescontado = true;
        const idx2 = DB[key].findIndex(x=>x.id===data.id);
        DB[key][idx2] = data;
        toast(`Stock descontado: ${Math.round(totalUsar)}g de ${f.marca||''} ${f.tipo} (incluye ${merma}% de merma)`);
      }
    }
  }

  await save(key);
  closeModal(); renderNav(); renderPage();

  // Módulo 1: animación del Bambu-Ómetro si el fondo subió (pedido marcado como cobrado)
  if(type==='pedido'){
    const newPct = metaPct();
    if(newPct > prevFondoPct) setTimeout(()=>{ const el=document.getElementById('goalFill'); if(el){ el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse'); } }, 50);
  }
  if(!(type==='pedido' && data.filamentoId && data.gramosUsados>0)) toast('Guardado');
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
function closeModalConfirm(){
  if(confirm('¿Salir sin guardar los cambios?')) closeModal();
}
async function removeItem(key, id, label){
  const idx = DB[key].findIndex(x=>x.id===id);
  if(idx===-1) return;
  const [removed] = DB[key].splice(idx,1);
  renderNav(); renderPage();
  let undone = false;
  toast(`${label[0].toUpperCase()+label.slice(1)} eliminado`, 'Deshacer', ()=>{
    undone = true;
    DB[key].splice(idx,0,removed);
    renderNav(); renderPage();
  });
  setTimeout(async ()=>{ if(!undone) await save(key); }, 4600);
}

/* ============ PAGE RENDER ============ */
let pedidoSearch = '';
function renderPage(opts){
  if(opts && opts.search!==undefined) pedidoSearch = opts.search;
  const titles = {dashboard:['Resumen','Tu taller, de un vistazo'], pedidos:['Pedidos','Todo lo que estás imprimiendo y entregando'],
    clientes:['Clientes','Quién te compra y cuánto'], filamentos:['Filamento','Stock de carretes y consumo'],
    presupuestos:['Presupuestos','Calculá precios y guardalos'], modelos:['Modelos','Tu catálogo de piezas listas para vender'],
    leads:['Redes (Instagram / Facebook)','Seguimiento manual de mensajes y publicaciones'],
    gastos:['Gastos','Lo que sale del bolsillo del taller'],
    finanzas:['Finanzas y Metas','Bambu-Ómetro, dólar, máquinas y punto de equilibrio'],
    config:['Configuración','Datos de tu negocio, valores por defecto y backup']};
  document.getElementById('pageTitle').textContent = titles[current][0];
  document.getElementById('pageSub').textContent = titles[current][1];
  const actions = document.getElementById('topbarActions');
  const content = document.getElementById('content');

  if(current==='dashboard'){ actions.innerHTML=''; content.innerHTML = renderDashboard(); }
  else if(current==='pedidos'){ actions.innerHTML = addBtn('pedido','Nuevo pedido'); content.innerHTML = renderPedidos(); }
  else if(current==='clientes'){ actions.innerHTML=''; content.innerHTML = renderClientes(); }
  else if(current==='filamentos'){ actions.innerHTML = addBtn('filamento','Nuevo carrete'); content.innerHTML = renderFilamentos(); }
  else if(current==='presupuestos'){ actions.innerHTML=''; content.innerHTML = renderPresupuestos(); attachCalc(); }
  else if(current==='modelos'){ actions.innerHTML = addBtn('modelo','Nuevo modelo'); content.innerHTML = renderModelos(); }
  else if(current==='leads'){ actions.innerHTML = addBtn('lead','Nuevo contacto'); content.innerHTML = renderLeads(); }
  else if(current==='gastos'){ actions.innerHTML = addBtn('gasto','Nuevo gasto'); content.innerHTML = renderGastos(); }
  else if(current==='finanzas'){ actions.innerHTML=''; content.innerHTML = renderFinanzas(); }
  else if(current==='config'){ actions.innerHTML=''; content.innerHTML = renderConfig(); }
}
function addBtn(type,label){ return `<button class="btn btn-primary" onclick="openForm('${type}')">${ICONS.plus}${label}</button>`; }
function badge(estado){
  const map={Pendiente:'b-pendiente',Imprimiendo:'b-imprimiendo',Listo:'b-listo',Enviado:'b-enviado',Entregado:'b-entregado',Cancelado:'b-cancelado',Nuevo:'b-nuevo',Conversando:'b-conversando',Convertido:'b-convertido',Descartado:'b-descartado'};
  return `<span class="badge ${map[estado]||'b-pendiente'}">${estado}</span>`;
}
function emptyBlock(title,sub){ return `<div class="empty"><b>${title}</b>${sub}</div>`; }
function waBtn(contacto, msg){
  const d = waDigits(contacto); if(!d) return '';
  const txt = msg ? `?text=${encodeURIComponent(msg)}` : '';
  return `<a class="btn btn-wa btn-sm" href="https://wa.me/${d}${txt}" target="_blank" rel="noopener" title="Escribir por WhatsApp">${ICONS.wa}</a>`;
}

/* ---- Dashboard ---- */
function metaPct(){ const obj = Number(DB.config.metaObjetivo||0); if(!obj) return 0; return Math.min(100, Math.round((fondoAhorro()/obj)*1000)/10); }
function renderDashboard(){
  const activos = DB.pedidos.filter(p=>!['Entregado','Cancelado'].includes(p.estado));
  const atrasados = DB.pedidos.filter(isAtrasado);
  const esteMes = todayStr().slice(0,7);
  const ingresosMes = DB.pedidos.filter(p=>p.fecha && p.fecha.startsWith(esteMes) && p.estado!=='Cancelado').reduce((s,p)=>s+Number(p.precio||0)+Number(p.costoEnvio||0)+Number(p.costoEmbalaje||0),0);
  const gastosMes = DB.gastos.filter(g=>g.fecha && g.fecha.startsWith(esteMes)).reduce((s,g)=>s+Number(g.monto||0),0);
  const bajoStock = DB.filamentos.filter(f=>lowStock(f)||humedadRiesgo(f));
  const sinResponder = DB.leads.filter(l=>!l.respondido);
  const proximas = activos.filter(p=>p.fechaEntrega && p.fechaEntrega>=todayStr()).sort((a,b)=>a.fechaEntrega.localeCompare(b.fechaEntrega)).slice(0,5);
  const maquinasCriticas = DB.maquinas.filter(m=>estadoMantenimiento(m)==='danger');

  const porCobrar = DB.pedidos.filter(p=>p.estado!=='Cancelado' && p.estadoPago!=='Pagado completo').reduce((s,p)=>{
    const calcTotal = Number(p.precio||0)+Number(p.costoEnvio||0)+Number(p.costoEmbalaje||0);
    return s + (calcTotal - Number(p.anticipo||0));
  },0);

  let bannerHtml = '';
  if(atrasados.length) bannerHtml += `<div class="banner">${ICONS.alert}Tenés ${atrasados.length} pedido(s) atrasado(s) — <a onclick="goTo('pedidos')" style="cursor:pointer">verlos</a></div>`;
  if(maquinasCriticas.length) bannerHtml += `<div class="banner warnb">${ICONS.alert}${maquinasCriticas.map(m=>m.nombre).join(', ')} necesita mantenimiento — <a onclick="goTo('finanzas')" style="cursor:pointer">ver detalle</a></div>`;

  const stats = `<div class="grid-stats">
    <div class="stat-card"><div class="label">Pedidos activos</div><div class="value">${activos.length}</div><div class="foot">${DB.pedidos.length} en total</div></div>
    <div class="stat-card"><div class="label">Ingresos del mes</div><div class="value grad">${money(ingresosMes)}</div><div class="foot">pedidos no cancelados</div></div>
    <div class="stat-card"><div class="label">Ganancia neta del mes</div><div class="value ${ (ingresosMes-gastosMes)<0?'danger':'' }">${money(ingresosMes-gastosMes)}</div><div class="foot">ingresos − gastos</div></div>
    <div class="stat-card"><div class="label">Por cobrar</div><div class="value ${porCobrar>0?'warn':''}">${money(porCobrar)}</div><div class="foot">señas y saldos pendientes</div></div>
    <div class="stat-card"><div class="label">Filamento bajo</div><div class="value ${bajoStock.length?'warn':''}">${bajoStock.length}</div><div class="foot">bajo stock o riesgo humedad</div></div>
  </div>`;

  const proxPedidos = activos.slice(0,5).map(p=>`<div class="mini-row"><div><div class="t">${esc(p.cliente)} — ${esc(p.modelo||'sin modelo')}</div><div class="s">${fmtDate(p.fecha)} · ${p.origen||''}</div></div>${badge(p.estado)}</div>`).join('') || emptyBlock('Sin pedidos activos','Cuando crees un pedido, aparece acá.');
  const entregasList = proximas.map(p=>`<div class="mini-row"><div><div class="t">${esc(p.cliente)}</div><div class="s">${esc(p.modelo||'')}</div></div><div class="s" style="font-weight:700;color:var(--text)">${fmtDate(p.fechaEntrega)}</div></div>`).join('') || emptyBlock('Sin entregas próximas','Agregá una fecha de entrega a tus pedidos.');
  const stockList = DB.filamentos.slice(0,5).map(f=>{ const pct=f.pesoTotal?Math.round((f.pesoRestante/f.pesoTotal)*100):0; return `<div class="mini-row"><div><div class="t">${esc(f.marca||'')} ${esc(f.tipo)} ${esc(f.color||'')}</div><div class="s">${f.pesoRestante}g de ${f.pesoTotal}g</div></div><span class="badge ${pct<=15?'b-cancelado':pct<=40?'b-pendiente':'b-entregado'}">${pct}%</span></div>`; }).join('') || emptyBlock('Sin carretes cargados','Agregá tu primer filamento en la sección Filamento.');
  const leadsList = sinResponder.slice(0,5).map(l=>`<div class="mini-row"><div><div class="t">${esc(l.usuario)}</div><div class="s">${l.plataforma} · ${fmtDate(l.fecha)}</div></div>${badge(l.estado||'Nuevo')}</div>`).join('') || emptyBlock('Estás al día','No hay mensajes sin responder.');
  const topModelos = (()=>{
    const counts = {};
    DB.pedidos.forEach(p=>{ if(!p.modelo) return; const k=p.modelo.trim(); if(!k) return; counts[k]=(counts[k]||0)+Number(p.cantidad||1); });
    const arr = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
    if(!arr.length) return emptyBlock('Sin datos todavía','Cuando registres pedidos, vas a ver tus piezas más pedidas.');
    const max = arr[0][1];
    return arr.map(([name,n])=>`<div class="mini-row"><div class="t">${esc(name)}</div><div style="flex:1;margin:0 12px;height:6px;background:var(--surface-3);border-radius:4px;overflow:hidden;"><div style="height:100%;width:${Math.round((n/max)*100)}%;background:var(--grad);"></div></div><span class="cell-val">${n}</span></div>`).join('');
  })();

  const pct = metaPct();
  const goalPanel = `<div class="panel"><h3>Bambu-Ómetro <a onclick="goTo('finanzas')">ver finanzas →</a></h3>${renderGoal(pct)}</div>`;

  return bannerHtml + stats + `
  <div class="dash-grid">
    <div class="panel"><h3>Pedidos activos <a onclick="goTo('pedidos')">ver todos →</a></h3>${proxPedidos}</div>
    <div class="panel"><h3>Próximas entregas <a onclick="goTo('pedidos')">ver todos →</a></h3>${entregasList}</div>
  </div>
  <div class="dash-grid" style="margin-top:16px;">
    <div class="panel"><h3>Ingresos vs gastos (6 meses)</h3>${renderChart()}</div>
    <div class="panel"><h3>Stock de filamento <a onclick="goTo('filamentos')">ver todo →</a></h3>${stockList}</div>
  </div>
  <div class="dash-grid" style="margin-top:16px;">
    ${goalPanel}
    <div class="panel"><h3>Sin responder en redes <a onclick="goTo('leads')">ver todo →</a></h3>${leadsList}</div>
  </div>
  <div class="dash-grid" style="margin-top:16px;">
    <div class="panel"><h3>Piezas más pedidas</h3>${topModelos}</div>
    <div class="panel"><h3>Máquinas <a onclick="goTo('finanzas')">ver todo →</a></h3>${renderMaquinasList()}</div>
  </div>
  `;
}
function renderGoal(pct){
  const objetivo = Number(DB.config.metaObjetivo||0);
  const fondo = fondoAhorro();
  const falta = Math.max(0, objetivo-fondo);
  return `<div class="goal-wrap">
    <div class="goal-top"><div class="amt">${money(fondo)} <small>de ${money(objetivo)}</small></div><span class="goal-pct">${pct}%</span></div>
    <div class="goal-bar"><div class="goal-bar-fill" id="goalFill" style="width:${pct}%"></div></div>
    <div class="goal-foot"><span>Meta: ${esc(DB.config.metaNombre||'Sin definir')}</span><span>Faltan ${money(falta)}</span></div>
  </div>`;
}
function renderMaquinasList(){
  if(!DB.maquinas.length) return emptyBlock('Sin máquinas cargadas','Agregalas desde Finanzas y Metas.');
  return DB.maquinas.map(m=>{
    const st = estadoMantenimiento(m);
    const desde = m.horasUso - (m.ultimaAlertaHoras||0);
    const pct = Math.min(100, Math.round((desde/m.alertaCada)*100));
    return `<div class="machine-row"><div><div class="m-name">${esc(m.nombre)}</div><div class="m-sub">${m.horasUso}hs totales · ${Math.round(desde)}hs desde último mantenimiento</div></div><div class="machine-bar"><div class="${st==='danger'?'mant-danger':st==='warn'?'mant-warn':'mant-ok'}" style="width:${pct}%"></div></div></div>`;
  }).join('');
}
function renderChart(){
  const months = [];
  const now = new Date();
  for(let i=5;i>=0;i--){ const d=new Date(now.getFullYear(), now.getMonth()-i, 1); months.push(d.toISOString().slice(0,7)); }
  const data = months.map(m=>{
    const ing = DB.pedidos.filter(p=>p.fecha&&p.fecha.startsWith(m)&&p.estado!=='Cancelado').reduce((s,p)=>s+Number(p.precio||0)+Number(p.costoEnvio||0)+Number(p.costoEmbalaje||0),0);
    const gas = DB.gastos.filter(g=>g.fecha&&g.fecha.startsWith(m)).reduce((s,g)=>s+Number(g.monto||0),0);
    return {m, ing, gas};
  });
  const max = Math.max(1, ...data.map(d=>Math.max(d.ing,d.gas)));
  const cols = data.map(d=>{
    const hIn = Math.max(2, Math.round((d.ing/max)*100));
    const hOut = Math.max(2, Math.round((d.gas/max)*100));
    const label = new Date(d.m+'-01').toLocaleDateString('es-AR',{month:'short'}).replace('.','');
    return `<div class="chart-col"><div class="chart-bars"><div class="chart-bar in" style="height:${hIn}px"></div><div class="chart-bar out" style="height:${hOut}px"></div></div><div class="chart-label">${label}</div></div>`;
  }).join('');
  return `<div class="chart-wrap">${cols}</div><div class="chart-legend"><span><i class="dot" style="background:var(--blue)"></i>Ingresos</span><span><i class="dot" style="background:var(--text-faint)"></i>Gastos</span></div>`;
}

let pedidoFilter = 'Todos';
let pedidoSort = 'reciente';
function renderPedidos(){
  const estados = ['Todos','Pendiente','Imprimiendo','Listo','Enviado','Entregado','Cancelado'];
  let list = DB.pedidos.filter(p=> pedidoFilter==='Todos' || p.estado===pedidoFilter);

/* ---- Clientes (computado) ---- */
function renderClientes(){
  const map = {};
  DB.pedidos.forEach(p=>{
    const key = (p.cliente||'Sin nombre').trim().toLowerCase();
    if(!map[key]) map[key] = {cliente:p.cliente||'Sin nombre', contacto:p.contacto, pedidos:0, total:0, pagado:0, ultimo:'', origen:{}};
    const c = map[key];
    
    const currTotal = Number(p.precio||0) + Number(p.costoEnvio||0) + Number(p.costoEmbalaje||0);
    c.pedidos++; 
    if(p.estado!=='Cancelado') c.total += currTotal;
    c.pagado += Number(p.anticipo||0) + (p.estadoPago==='Pagado completo'? (currTotal - Number(p.anticipo||0)) : 0);
    
    if(!c.ultimo || (p.fecha||'') > c.ultimo) c.ultimo = p.fecha||c.ultimo;
    if(p.contacto) c.contacto = p.contacto;
    c.origen[p.origen||'Otro'] = (c.origen[p.origen||'Otro']||0)+1;
  });
  const list = Object.values(map).sort((a,b)=>b.total-a.total);
  if(!list.length) return emptyBlock('Todavía no tenés clientes','Aparecen automáticamente cuando creás pedidos.');

async function usarFilamento(id){
  const f = DB.filamentos.find(x=>x.id===id); if(!f) return;
  const g = prompt(`¿Cuántos gramos de "${f.marca||''} ${f.tipo}" usaste (sin contar merma)?`, '20');
  if(g===null) return;
  const n = Number(g);
  if(isNaN(n) || n<=0){ toast('Cantidad inválida'); return; }
  const merma = Number(DB.config.mermaPct||0);
  const total = n*(1+merma/100);
  f.pesoRestante = Math.max(0, Number(f.pesoRestante||0) - total);
  await save('filamentos'); renderNav(); renderPage();
  toast(`Restados ${Math.round(total)}g (incluye ${merma}% merma)`);
}

function setMargen(n){ document.getElementById('cMargen').value = n; updateCalc(); }
function calcTotal(){
  const fila = DB.filamentos.find(f=>f.id===document.getElementById('cFila').value);
  const horas = Number(document.getElementById('cHoras').value||0);
  const minutos = Number(document.getElementById('cMinutos').value||0);
  const gramos = Number(document.getElementById('cGramos').value||0);
  const insumosExtra = Number(document.getElementById('cInsumos').value||0);
  const envio = Number(document.getElementById('cEnvio').value||0);
  const margen = Number(document.getElementById('cMargen').value|| DB.config.margenGanancia||4);

  const precioKwh = Number(DB.config.precioKwh||0);
  const consumoW = Number(DB.config.consumoW||0);
  const vidaUtil = Number(DB.config.vidaUtilHoras||0);
  const costoRepuestos = Number(DB.config.costoRepuestos||0);
  const margenErrorPct = Number(DB.config.margenErrorPct||0);
  const markupInsumosPct = Number(DB.config.markupInsumosPct!==undefined ? DB.config.markupInsumosPct : 30);
  const markupMLPct = Number(DB.config.markupMLPct!==undefined ? DB.config.markupMLPct : 20);

  const horasTotales = horas + (minutos/60);
  const precioMaterial = fila ? gramos*(Number(fila.precioKg||0)/1000) : 0;
  const precioLuz = (consumoW/1000)*horasTotales*precioKwh;
  const desgaste = vidaUtil>0 ? (costoRepuestos/vidaUtil)*horasTotales : 0;
  const subtotalBase = precioMaterial+precioLuz+desgaste;
  const margenError = subtotalBase*(margenErrorPct/100);
  const costoTotalSinInsumos = subtotalBase+margenError;
  const insumosConMarkup = insumosExtra*(1+markupInsumosPct/100);
  const productoTotal = (costoTotalSinInsumos+insumosConMarkup)*margen;
  const totalACobrar = productoTotal + envio;
  const precioML = productoTotal*(1+markupMLPct/100) + envio;

  return {fila,gramos,horas,minutos,horasTotales,insumosExtra,envio,margen,precioMaterial,precioLuz,desgaste,margenErrorPct,margenError,costoTotalSinInsumos,markupInsumosPct,insumosConMarkup,markupMLPct,totalACobrar,precioML,total:totalACobrar};
}
function attachCalc(){
  ['cFila','cGramos','cHoras','cMinutos','cInsumos','cEnvio','cMargen'].forEach(id=>{ const el=document.getElementById(id); if(el) el.oninput=updateCalc; });
  updateCalc();
}
function updateCalc(){
  const r = calcTotal();
  const dolar = DB.finanzas.dolar;
  const usdLine = dolar && dolar.venta ? `<div class="result-line" style="border-top:1px dashed var(--border);padding-top:10px;margin-top:4px;"><span>≈ en USD (blue ${money(dolar.venta)})</span><span class="v">u$s ${(r.totalACobrar/dolar.venta).toLocaleString('es-AR',{maximumFractionDigits:2})}</span></div>` : '';
  document.getElementById('calcResult').innerHTML = `
    <h3>Presupuesto</h3>
    <div class="result-line"><span>Precio material (${r.gramos}g)</span><span class="v">${money(r.precioMaterial)}</span></div>
    <div class="result-line"><span>Precio luz</span><span class="v">${money(r.precioLuz)}</span></div>
    <div class="result-line"><span>Desgaste máquina</span><span class="v">${money(r.desgaste)}</span></div>
    <div class="result-line"><span>Margen de error (${r.margenErrorPct}%)</span><span class="v">${money(r.margenError)}</span></div>
    <div class="result-line" style="border-top:1px solid var(--border);padding-top:10px;margin-top:4px;"><span style="font-weight:700;">Costo total (sin insumos)</span><span class="v" style="font-weight:700;">${money(r.costoTotalSinInsumos)}</span></div>
    <div class="result-line"><span>Insumos (+${r.markupInsumosPct}%)</span><span class="v">${money(r.insumosConMarkup)}</span></div>
    <div class="result-line"><span>Envío</span><span class="v">${money(r.envio)}</span></div>
    <div class="result-total"><span class="l">Total a cobrar (×${r.margen})</span><span class="v">${money(r.totalACobrar)}</span></div>
    ${usdLine}
    <div style="background:var(--warn-dim);border:1px solid #F5DFAE;border-radius:var(--radius-sm);padding:10px 12px;margin-top:10px;">
      <div style="font-size:10.5px;color:var(--warn);font-weight:700;text-transform:uppercase;">Precio sugerido MercadoLibre (+${r.markupMLPct}%)</div>
      <div style="font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--warn);">${money(r.precioML)}</div>
    </div>`;
}
async function guardarPresupuesto(){
  const r = calcTotal();
  const cliente = document.getElementById('cCliente').value;
  DB.presupuestos.unshift({id:uid(), cliente, gramos:r.gramos, horas:r.horas, total:Math.round(r.total), fecha:todayStr()});
  await save('presupuestos'); renderPage();
  toast('Presupuesto guardado');
}
function copiarPresupuesto(){
  const r = calcTotal();
  const txt = `Hola! Te paso el presupuesto:\n· Pieza: ${r.fila? (r.fila.marca+' '+r.fila.tipo) : 'a definir'}\n· Tiempo estimado: ${r.horas} hs\n· Total: ${money(Math.round(r.totalACobrar))}\n¿Confirmamos el pedido?`;
  navigator.clipboard.writeText(txt).then(()=>toast('Copiado, pegalo en WhatsApp')).catch(()=>toast('No se pudo copiar'));
}

/* ---- Finanzas y Metas (Módulo 1) ---- */
function renderFinanzas(){
  const pct = metaPct();
  const dolar = DB.finanzas.dolar;
  const fxLine = dolar ? `<span class="fx-pill">Compra ${money(dolar.compra)}</span><span class="fx-pill">Venta ${money(dolar.venta)}</span><span style="color:var(--text-faint);font-size:11px;">act. ${new Date(dolar.fecha).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>` : `<span style="color:var(--text-faint);">Sin consultar todavía</span>`;

  const retiros = (DB.finanzas.retirosFondo||[]).slice(0,6).map(r=>`<div class="mini-row"><div><div class="t">${money(r.monto)}</div><div class="s">${esc(r.nota||'')} · ${fmtDate(r.fecha)}</div></div></div>`).join('') || emptyBlock('Sin retiros','El fondo crece solo con lo cobrado en pedidos.');

  const goalPanel = `<div class="panel">
    <h3>Bambu-Ómetro <a onclick="openForm('retiro')" style="cursor:pointer">+ registrar retiro</a></h3>
    ${renderGoal(pct)}
    <div style="margin-top:16px;">${retiros}</div>
  </div>`;

  const fxPanel = `<div class="panel">
    <h3>Cotización del dólar (Blue)</h3>
    <div class="fx-row" id="fxRow">${fxLine}</div>
    <button class="btn btn-primary btn-sm" style="margin-top:12px;" onclick="actualizarDolar()">${ICONS.download} Actualizar cotización</button>
    <div class="info-box" style="margin-top:12px;">Se usa para mostrar el total del presupuesto también en dólares (fuente: DolarAPI.com).</div>
  </div>`;

  const maquinasPanel = `<div class="panel">
    <h3>Máquinas y amortización</h3>
    ${DB.maquinas.map(m=>{
      const st = estadoMantenimiento(m);
      const desde = m.horasUso - (m.ultimaAlertaHoras||0);
      const pctm = Math.min(100, Math.round((desde/m.alertaCada)*100));
      return `<div class="machine-row">
        <div><div class="m-name">${esc(m.nombre)}</div><div class="m-sub">${m.horasUso}hs totales · alerta cada ${m.alertaCada}hs · ${Math.round(desde)}hs desde el último mantenimiento</div></div>
        <div class="machine-bar"><div class="${st==='danger'?'mant-danger':st==='warn'?'mant-warn':'mant-ok'}" style="width:${pctm}%"></div></div>
        <div class="row-actions">
          <button class="btn btn-ghost btn-sm" title="Sumar horas de impresión" onclick="promptSumarHoras('${m.id}')">${ICONS.clock}</button>
          <button class="btn btn-ghost btn-sm" title="Marcar mantenimiento hecho" onclick="marcarMantenimiento('${m.id}')">✓</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;

  const beData = breakEvenData();
  const beMax = Math.max(1, ...beData.map(d=>Math.max(d.ing,d.gas)));
  const bePanel = `<div class="panel">
    <h3>Punto de equilibrio (últimos 6 meses)</h3>
    <div class="break-even-wrap">
      ${beData.map(d=>`
        <div class="be-row"><span class="be-label">${d.label} ing.</span><div class="be-track"><div class="be-fill ing" style="width:${Math.max(4,Math.round((d.ing/beMax)*100))}%">${money(d.ing)}</div></div></div>
        <div class="be-row"><span class="be-label">${d.label} cost.</span><div class="be-track"><div class="be-fill gas" style="width:${Math.max(4,Math.round((d.gas/beMax)*100))}%">${money(d.gas)}</div></div></div>
      `).join('')}
    </div>
    <div class="info-box" style="margin-top:12px;">"Costos" acá suma tus gastos reales del mes más una estimación de luz y desgaste de máquina por las horas cargadas. El mes en que la barra verde supera a la roja, estás ganando plata neta.</div>
  </div>`;

  return `<div class="finance-grid">${goalPanel}${fxPanel}</div><div class="finance-grid" style="margin-top:16px;">${maquinasPanel}${bePanel}</div>`;
}
function promptSumarHoras(id){
  const h = prompt('¿Cuántas horas de impresión sumar a esta máquina?', '3');
  if(h===null) return;
  const n = Number(h);
  if(isNaN(n) || n<=0){ toast('Cantidad inválida'); return; }
  sumarHorasMaquina(id, n);
}
function breakEvenData(){
  const months = [];
  const now = new Date();
  for(let i=5;i>=0;i--){ const d=new Date(now.getFullYear(), now.getMonth()-i, 1); months.push(d.toISOString().slice(0,7)); }
  const horasTotalMes = DB.maquinas.reduce((s,m)=>s+Number(m.horasUso||0),0) / 6; // estimación pareja si no hay más detalle
  return months.map(m=>{
    const ing = DB.pedidos.filter(p=>p.fecha&&p.fecha.startsWith(m)&&p.estado!=='Cancelado').reduce((s,p)=>s+Number(p.precio||0)+Number(p.costoEnvio||0)+Number(p.costoEmbalaje||0),0);
    const gastosReales = DB.gastos.filter(g=>g.fecha&&g.fecha.startsWith(m)).reduce((s,g)=>s+Number(g.monto||0),0);
    const luzEstim = (Number(DB.config.consumoW||0)/1000)*horasTotalMes*Number(DB.config.precioKwh||0);
    const desgasteEstim = Number(DB.config.vidaUtilHoras||0)>0 ? (Number(DB.config.costoRepuestos||0)/Number(DB.config.vidaUtilHoras||0))*horasTotalMes : 0;
    const label = new Date(m+'-01').toLocaleDateString('es-AR',{month:'short'}).replace('.','');
    return {label, ing, gas: gastosReales+luzEstim+desgasteEstim};
  });
}

/* ---- Config ---- */
function renderConfig(){
  const c = DB.config;
  return `<div class="config-form panel">

    <div class="field-row">
      <div class="field"><label>Instagram</label><input id="cfIg" type="text" value="${esc(c.instagram)}"></div>
      <div class="field"><label>WhatsApp (con código de país)</label><input id="cfWa" type="text" placeholder="5491122334455" value="${esc(c.whatsapp)}"></div>
    </div>
    <div class="field"><label>Símbolo de moneda</label><input id="cfMoneda" type="text" value="${esc(c.moneda)}" style="max-width:80px;"></div>
    <button class="btn btn-primary" onclick="saveConfig()" style="align-self:flex-start;">Guardar configuración</button>
  </div>
  <div class="panel" style="max-width:480px;margin-top:16px;">
    <h3>Costos fijos del taller</h3>
    <div class="info-box" style="margin-bottom:4px;">Estos valores alimentan la calculadora de Presupuestos: precio de la luz, desgaste de la máquina y margen de seguridad.</div>
    <div class="field-row">
      <div class="field"><label>Precio del kWh ($)</label><input id="cfKwh" type="number" value="${c.precioKwh}"></div>
      <div class="field"><label>Consumo de la impresora (W)</label><input id="cfW" type="number" value="${c.consumoW}"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Vida útil de la máquina (hs)</label><input id="cfVida" type="number" value="${c.vidaUtilHoras}"></div>
      <div class="field"><label>Costo de repuestos en esa vida útil ($)</label><input id="cfRepuestos" type="number" value="${c.costoRepuestos}"></div>
    </div>
    <div class="field"><label>Margen de error (%)</label><input id="cfErrorPct" type="number" value="${c.margenErrorPct}" style="max-width:120px;"></div>
    <button class="btn btn-primary" onclick="saveConfig()" style="align-self:flex-start;">Guardar costos fijos</button>
  </div>
  <div class="panel" style="max-width:480px;margin-top:16px;">
    <h3>Ganancia y plataformas</h3>
    <div class="field"><label>Margen de ganancia por defecto (multiplicador)</label><input id="cfMargen" type="number" value="${c.margenGanancia}" step="0.5" style="max-width:120px;"></div>
    <div class="field-row">
      <div class="field"><label>Recargo por insumos extra (%)</label><input id="cfInsumosPct" type="number" value="${c.markupInsumosPct}"></div>
      <div class="field"><label>Recargo sugerido MercadoLibre (%)</label><input id="cfMLPct" type="number" value="${c.markupMLPct}"></div>
    </div>
    <button class="btn btn-primary" onclick="saveConfig()" style="align-self:flex-start;">Guardar</button>
  </div>
  <div class="panel" style="max-width:480px;margin-top:16px;">
    <h3>Meta de ahorro (Bambu-Ómetro)</h3>
    <div class="field"><label>Qué estás ahorrando</label><input id="cfMetaNombre" type="text" value="${esc(c.metaNombre)}"></div>
    <div class="field"><label>Objetivo ($)</label><input id="cfMetaObjetivo" type="number" value="${c.metaObjetivo}"></div>
    <button class="btn btn-primary" onclick="saveConfig()" style="align-self:flex-start;">Guardar meta</button>
  </div>
  <div class="panel" style="max-width:480px;margin-top:16px;">
    <h3>Stock de filamento e insumos</h3>
    <div class="field-row">
      <div class="field"><label>% de merma por defecto (soportes/faldas)</label><input id="cfMerma" type="number" value="${c.mermaPct!==undefined?c.mermaPct:8}"></div>
      <div class="field"><label>Alertar stock bajo desde (g)</label><input id="cfAlertaG" type="number" value="${c.alertaGramos!==undefined?c.alertaGramos:150}"></div>
    </div>
    <div class="field"><label>Alertar riesgo de humedad después de (días abierto)</label><input id="cfAlertaDias" type="number" value="${c.alertaHumedadDias!==undefined?c.alertaHumedadDias:90}" style="max-width:160px;"></div>
    <button class="btn btn-primary" onclick="saveConfig()" style="align-self:flex-start;">Guardar</button>
  </div>
  <div class="panel" style="max-width:480px;margin-top:16px;">
    <h3>Backup de tus datos</h3>
    <div class="info-box">Todo se guarda solo en este navegador. Si cambiás de compu, borrás el historial, o querés tener una copia de seguridad, exportá un archivo y guardalo en tu Google Drive o donde prefieras.</div>
    <div class="backup-actions">
      <button class="btn btn-primary" onclick="exportarBackup()">${ICONS.download} Exportar backup</button>
      <label class="btn btn-ghost" style="margin:0;">${ICONS.upload} Restaurar backup<input type="file" accept="application/json" style="display:none" onchange="importarBackup(event)"></label>

async function saveConfig(){
  const get = id => document.getElementById(id);
  DB.config = {
    ...DB.config,
    nombreNegocio: get('cfNombre') ? get('cfNombre').value : DB.config.nombreNegocio,
    instagram: get('cfIg') ? get('cfIg').value : DB.config.instagram,
    whatsapp: get('cfWa') ? get('cfWa').value : DB.config.whatsapp,
    moneda: (get('cfMoneda') ? get('cfMoneda').value : DB.config.moneda) || '$',
    precioKwh: get('cfKwh') ? Number(get('cfKwh').value||0) : DB.config.precioKwh,
    consumoW: get('cfW') ? Number(get('cfW').value||0) : DB.config.consumoW,
    vidaUtilHoras: get('cfVida') ? Number(get('cfVida').value||0) : DB.config.vidaUtilHoras,
    costoRepuestos: get('cfRepuestos') ? Number(get('cfRepuestos').value||0) : DB.config.costoRepuestos,
    margenErrorPct: get('cfErrorPct') ? Number(get('cfErrorPct').value||0) : DB.config.margenErrorPct,
    margenGanancia: get('cfMargen') ? Number(get('cfMargen').value||4) : DB.config.margenGanancia,
    markupInsumosPct: get('cfInsumosPct') ? Number(get('cfInsumosPct').value||30) : DB.config.markupInsumosPct,
    markupMLPct: get('cfMLPct') ? Number(get('cfMLPct').value||20) : DB.config.markupMLPct,
    metaNombre: get('cfMetaNombre') ? get('cfMetaNombre').value : DB.config.metaNombre,
    metaObjetivo: get('cfMetaObjetivo') ? Number(get('cfMetaObjetivo').value||0) : DB.config.metaObjetivo,
    mermaPct: get('cfMerma') ? Number(get('cfMerma').value||0) : DB.config.mermaPct,
    alertaGramos: get('cfAlertaG') ? Number(get('cfAlertaG').value||150) : DB.config.alertaGramos,
    alertaHumedadDias: get('cfAlertaDias') ? Number(get('cfAlertaDias').value||90) : DB.config.alertaHumedadDias,
  };
  await save('config');
  renderNav(); renderPage();
  toast('Configuración guardada');
}
function exportarBackup(){
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `m3diir-backup-${todayStr()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Backup descargado');
}
async function importarBackup(ev){
  const file = ev.target.files[0]; if(!file) return;
  if(!confirm('Esto va a reemplazar todos tus datos actuales con los del backup. ¿Continuar?')) { ev.target.value=''; return; }
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    for(const k of ['pedidos','filamentos','modelos','leads','presupuestos','gastos','maquinas']){ DB[k] = parsed[k]||(k==='maquinas'?MAQUINAS_DEFAULT.map(m=>({...m})):[]); await save(k); }
    DB.config = parsed.config || DB.config; await save('config');
    DB.finanzas = parsed.finanzas || DB.finanzas; await save('finanzas');
    renderNav(); renderPage();
    toast('Backup restaurado');
  }catch(e){ toast('El archivo no es un backup válido'); }
  ev.target.value='';
}

/* ============ THEME ============ */
function applyTheme(t){
  document.body.setAttribute('data-theme', t);
  document.getElementById('themeLabel').textContent = t==='dark' ? 'Modo oscuro' : 'Modo claro';
}
async function toggleTheme(){
  const cur = document.body.getAttribute('data-theme')==='dark' ? 'light' : 'dark';
  applyTheme(cur);
  DB.config.theme = cur;
  await save('config');
}

/* ============ KEYBOARD / MISC ============ */
document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeModalConfirm(); });

/* ============ INIT ============ */
(async function init(){
  await loadAll();
  applyTheme(DB.config.theme || 'light');
  renderNav();
  renderPage();
  document.getElementById('appLoading').style.display = 'none';
  if(!storageOk) toast('No se pudo acceder al almacenamiento persistente: tus datos no se guardarán al cerrar.');
})();
</script>
